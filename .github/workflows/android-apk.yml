name: Build Android APK (Debug)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - '.github/workflows/android-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync capacitor(android)
        run: npm run cap:sync:android
        env:
          VITE_TEXT_GENERATION_BASE_URL: ${{ secrets.VITE_TEXT_GENERATION_BASE_URL }}
          VITE_TEXT_GENERATION_API_KEY: ${{ secrets.VITE_TEXT_GENERATION_API_KEY }}
          VITE_TEXT_GENERATION_MODEL: ${{ secrets.VITE_TEXT_GENERATION_MODEL }}
          VITE_TEXT_GENERATION_TEMPERATURE: ${{ secrets.VITE_TEXT_GENERATION_TEMPERATURE }}
          VITE_TEXT_GENERATION_TIMEOUT: ${{ secrets.VITE_TEXT_GENERATION_TIMEOUT }}
          VITE_IMAGE_GENERATION_BASE_URL: ${{ secrets.VITE_IMAGE_GENERATION_BASE_URL }}
          VITE_IMAGE_GENERATION_API_KEY: ${{ secrets.VITE_IMAGE_GENERATION_API_KEY }}
          VITE_IMAGE_GENERATION_MODEL: ${{ secrets.VITE_IMAGE_GENERATION_MODEL }}

      - name: Create Android local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fan-app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
